apiVersion: batch/v1
kind: CronJob
metadata:
  name: matchmaker-create-bookings
spec:
  schedule: "0 8 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: curl
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              curl -X POST http://matchmaker:3000/api/cron/create-bookings
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: matchmaker-process-followups
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: curl
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              curl -X POST http://matchmaker:3000/api/cron/process-followups