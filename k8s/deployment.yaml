apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaker
  labels:
    app: matchmaker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchmaker
  template:
    metadata:
      labels:
        app: matchmaker
    spec:
      containers:
      - name: matchmaker
        image: matchmaker:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: supabase-url
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: supabase-anon-key
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: supabase-service-role-key
        - name: SMS_GATEWAY_URL
          value: "http://sms-gateway:8080"
        - name: SMS_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: sms-gateway-api-key
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: telegram-bot-token
        - name: ADMIN_TELEGRAM_CHAT_ID
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: admin-telegram-chat-id
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: matchmaker-secrets
              key: openai-api-key
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaker
spec:
  selector:
    app: matchmaker
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP